<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elysian | 3-in-1 Premium Calculator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            transition: all 0.5s ease;
        }

        .calculator-wrapper {
            max-width: 600px;
            width: 100%;
        }

        .calculator {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .calc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon i {
            font-size: 1.4rem;
            color: white;
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .theme-rings {
            display: flex;
            gap: 10px;
        }

        .ring {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .ring.active {
            border-color: white;
            transform: scale(1.1);
        }

        .ring-dark { background: linear-gradient(135deg, #1e1b4b, #312e81); }
        .ring-aurora { background: linear-gradient(135deg, #0f766e, #0891b2); }
        .ring-sunset { background: linear-gradient(135deg, #be185d, #f97316); }

        .mode-container {
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 4px;
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .display {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: right;
        }

        .expression {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            min-height: 24px;
        }

        .result {
            font-size: 2.8rem;
            font-weight: 700;
            color: white;
            word-wrap: break-word;
            margin-top: 8px;
        }

        .programmer-info {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .programmer-info.show {
            display: flex;
        }

        .scientific-grid {
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .scientific-grid.show {
            display: grid;
        }

        .programmer-grid {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .programmer-grid.show {
            display: grid;
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            padding: 16px 12px;
            border: none;
            border-radius: 28px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif;
        }

        .calc-btn:hover {
            transform: translateY(-2px);
        }

        .calc-btn:active {
            transform: translateY(1px);
        }

        .btn-number {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .btn-operator {
            background: rgba(99, 102, 241, 0.2);
            color: #a78bfa;
        }

        .btn-scientific {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            font-size: 0.85rem;
            padding: 12px 8px;
        }

        .btn-programmer {
            background: rgba(236, 72, 153, 0.15);
            color: #f9a8d4;
            font-size: 0.85rem;
            padding: 12px 8px;
        }

        .btn-equals {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-clear {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .btn-delete {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .btn-zero {
            grid-column: span 2;
        }

        .history-panel {
            position: fixed;
            right: -380px;
            top: 0;
            width: 380px;
            height: 100vh;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            transition: right 0.3s ease;
            z-index: 1000;
            padding: 24px;
            overflow-y: auto;
        }

        .history-panel.open {
            right: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .history-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
        }

        .history-clear {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(-5px);
        }

        .history-expr {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        .history-result {
            font-size: 1.1rem;
            font-weight: 700;
            color: #a78bfa;
            margin-top: 5px;
        }

        .history-toggle {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1001;
            font-size: 1.2rem;
        }

        @media (max-width: 550px) {
            .calculator { padding: 16px; }
            .calc-btn { padding: 12px 6px; font-size: 0.9rem; }
            .btn-scientific, .btn-programmer { font-size: 0.65rem; padding: 10px 4px; }
            .result { font-size: 2rem; }
            .history-panel { width: 300px; }
            .mode-btn { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="calculator-wrapper">
    <div class="calculator">
        <div class="calc-header">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-calculator"></i></div>
                <span class="brand-name">ELYSIAN</span>
            </div>
            <div class="theme-rings">
                <div class="ring ring-dark active" data-theme="dark"></div>
                <div class="ring ring-aurora" data-theme="aurora"></div>
                <div class="ring ring-sunset" data-theme="sunset"></div>
            </div>
        </div>

        <div class="mode-container">
            <button class="mode-btn active" data-mode="basic">BASIC</button>
            <button class="mode-btn" data-mode="scientific">SCIENTIFIC</button>
            <button class="mode-btn" data-mode="programmer">PROGRAMMER</button>
        </div>

        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
            <div class="programmer-info" id="programmerInfo">
                <span>HEX: <span id="hexVal">0</span></span>
                <span>BIN: <span id="binVal">0</span></span>
                <span>DEC: <span id="decVal">0</span></span>
            </div>
        </div>

        <!-- Scientific Grid -->
        <div class="scientific-grid" id="scientificGrid">
            <button class="calc-btn btn-scientific" data-func="sin">sin</button>
            <button class="calc-btn btn-scientific" data-func="cos">cos</button>
            <button class="calc-btn btn-scientific" data-func="tan">tan</button>
            <button class="calc-btn btn-scientific" data-func="sqrt">√</button>
            <button class="calc-btn btn-scientific" data-func="pow2">x²</button>
            <button class="calc-btn btn-scientific" data-func="log">log</button>
            <button class="calc-btn btn-scientific" data-func="ln">ln</button>
            <button class="calc-btn btn-scientific" data-func="pi">π</button>
            <button class="calc-btn btn-scientific" data-func="e">e</button>
            <button class="calc-btn btn-scientific" data-func="fact">n!</button>
        </div>

        <!-- Programmer Grid -->
        <div class="programmer-grid" id="programmerGrid">
            <button class="calc-btn btn-programmer" data-prog="hex">HEX</button>
            <button class="calc-btn btn-programmer" data-prog="dec">DEC</button>
            <button class="calc-btn btn-programmer" data-prog="bin">BIN</button>
            <button class="calc-btn btn-programmer" data-prog="oct">OCT</button>
            <button class="calc-btn btn-programmer" data-prog="and">AND</button>
            <button class="calc-btn btn-programmer" data-prog="or">OR</button>
            <button class="calc-btn btn-programmer" data-prog="xor">XOR</button>
            <button class="calc-btn btn-programmer" data-prog="not">NOT</button>
            <button class="calc-btn btn-programmer" data-prog="lshift"><<</button>
            <button class="calc-btn btn-programmer" data-prog="rshift">>></button>
            <button class="calc-btn btn-programmer" data-prog="A">A</button>
            <button class="calc-btn btn-programmer" data-prog="B">B</button>
            <button class="calc-btn btn-programmer" data-prog="C">C</button>
            <button class="calc-btn btn-programmer" data-prog="D">D</button>
            <button class="calc-btn btn-programmer" data-prog="E">E</button>
            <button class="calc-btn btn-programmer" data-prog="F">F</button>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <button class="calc-btn btn-clear" data-action="clear">AC</button>
            <button class="calc-btn btn-delete" data-action="delete">⌫</button>
            <button class="calc-btn btn-operator" data-op="%">%</button>
            <button class="calc-btn btn-operator" data-op="/">÷</button>
            <button class="calc-btn btn-number" data-num="7">7</button>
            <button class="calc-btn btn-number" data-num="8">8</button>
            <button class="calc-btn btn-number" data-num="9">9</button>
            <button class="calc-btn btn-operator" data-op="*">×</button>
            <button class="calc-btn btn-number" data-num="4">4</button>
            <button class="calc-btn btn-number" data-num="5">5</button>
            <button class="calc-btn btn-number" data-num="6">6</button>
            <button class="calc-btn btn-operator" data-op="-">−</button>
            <button class="calc-btn btn-number" data-num="1">1</button>
            <button class="calc-btn btn-number" data-num="2">2</button>
            <button class="calc-btn btn-number" data-num="3">3</button>
            <button class="calc-btn btn-operator" data-op="+">+</button>
            <button class="calc-btn btn-number btn-zero" data-num="0">0</button>
            <button class="calc-btn btn-number" data-num=".">.</button>
            <button class="calc-btn btn-equals" data-action="equals">=</button>
        </div>
    </div>
</div>

<button class="history-toggle" id="historyToggle"><i class="fas fa-history"></i></button>

<div class="history-panel" id="historyPanel">
    <div class="history-header">
        <h3><i class="fas fa-clock"></i> History</h3>
        <button class="history-clear" id="clearHistory">Clear All</button>
    </div>
    <ul class="history-list" id="historyList">
        <li style="text-align: center; opacity: 0.5;">No history yet</li>
    </ul>
</div>

<script src="script.js"></script>
</body>
</html>
